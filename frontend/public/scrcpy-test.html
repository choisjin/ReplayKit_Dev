<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>scrcpy Web Streaming Test</title>
<script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Consolas', monospace; padding: 16px; }
  h1 { color: #7b68ee; margin-bottom: 12px; font-size: 18px; }
  .row { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .panel { background: #16213e; border-radius: 8px; padding: 12px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  label { font-size: 12px; color: #888; }
  input, select, button { background: #0f3460; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 13px; }
  button { cursor: pointer; font-weight: bold; }
  button:hover { background: #1a4a8a; }
  button.danger { background: #8b0000; }
  button.danger:hover { background: #b22222; }
  #video-container { position: relative; display: inline-block; background: #000; border: 2px solid #333; border-radius: 4px; }
  #video-container video, #video-container img { max-width: 100%; max-height: 70vh; display: block; }
  #stats { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #0f0; font-size: 11px; padding: 4px 8px; border-radius: 4px; pointer-events: none; }
  #log { background: #0a0a1a; color: #aaa; font-size: 11px; height: 200px; overflow-y: auto; padding: 8px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
  .log-info { color: #4fc3f7; }
  .log-error { color: #ef5350; }
  .log-warn { color: #ffa726; }
  .log-data { color: #66bb6a; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; }
  .tag-h264 { background: #1b5e20; color: #a5d6a7; }
  .tag-jpeg { background: #e65100; color: #ffcc80; }
  .tag-off { background: #333; color: #888; }
  .touch-indicator { position: absolute; width: 30px; height: 30px; border: 2px solid #ff0; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.1s; }
  .touch-indicator.active { opacity: 1; }
</style>
</head>
<body>

<h1>scrcpy Web Streaming Test</h1>

<div class="row">
  <div class="panel controls">
    <label>Device:</label>
    <select id="device-select"><option value="">Loading...</option></select>
    <label>Display:</label>
    <input id="display-id" type="number" value="0" min="0" style="width:50px">
    <label><input type="checkbox" id="force-h264" checked> Force H.264</label>
    <button id="btn-connect" onclick="connect()">Connect</button>
    <button id="btn-disconnect" class="danger" onclick="disconnect()">Disconnect</button>
    <span id="mode-tag" class="tag tag-off">OFF</span>
    <span id="fps-display" style="font-size:14px;font-weight:bold;color:#0f0">-- fps</span>
  </div>
</div>

<div class="row">
  <div>
    <div id="video-container">
      <video id="player" autoplay muted playsinline></video>
      <img id="jpeg-display" style="display:none" />
      <canvas id="touch-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair"></canvas>
      <div id="stats"></div>
      <div id="touch-dot" class="touch-indicator"></div>
    </div>
    <div style="margin-top:4px;font-size:11px;color:#666" id="info-bar">Ready</div>
  </div>
  <div style="flex:1;min-width:300px">
    <div style="margin-bottom:8px;display:flex;gap:8px">
      <button onclick="clearLog()">Clear Log</button>
      <label><input type="checkbox" id="log-data" checked> Data logs</label>
      <label><input type="checkbox" id="log-nal" checked> NAL parse</label>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
// --- State ---
let ws = null;
let jmuxer = null;
let h264Mode = false;
let h264Size = { w: 0, h: 0 };
let frameCount = 0;
let byteCount = 0;
let fpsInterval = null;
let lastFps = 0;
let nalStats = {};

// --- Log ---
const logEl = document.getElementById('log');
function log(msg, cls = 'log-info') {
  const ts = new Date().toLocaleTimeString('en', { hour12: false, fractionalSecondDigits: 3 });
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${ts}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  if (logEl.children.length > 500) logEl.removeChild(logEl.firstChild);
}
function clearLog() { logEl.innerHTML = ''; }

// --- Device list ---
async function loadDevices() {
  try {
    const res = await fetch('/api/device/list');
    const data = await res.json();
    const sel = document.getElementById('device-select');
    sel.innerHTML = '';
    const devices = [...(data.primary || []), ...(data.auxiliary || [])];
    devices.filter(d => d.category === 'primary').forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = `${d.name || d.id} (${d.type})`;
      sel.appendChild(opt);
    });
    if (sel.options.length === 0) sel.innerHTML = '<option value="">No devices</option>';
    log(`Loaded ${sel.options.length} device(s)`);
  } catch (e) {
    log('Failed to load devices: ' + e.message, 'log-error');
  }
}

// --- FPS counter ---
function startFps() {
  frameCount = 0; byteCount = 0;
  if (fpsInterval) clearInterval(fpsInterval);
  fpsInterval = setInterval(() => {
    lastFps = frameCount;
    document.getElementById('fps-display').textContent = `${frameCount} fps (${(byteCount/1024).toFixed(0)} KB/s)`;
    document.getElementById('stats').textContent = `${h264Mode?'H.264':'JPEG'} ${frameCount}fps ${h264Size.w}x${h264Size.h}`;
    frameCount = 0; byteCount = 0;
  }, 1000);
}
function stopFps() {
  if (fpsInterval) { clearInterval(fpsInterval); fpsInterval = null; }
  document.getElementById('fps-display').textContent = '-- fps';
  document.getElementById('stats').textContent = '';
}

// --- NAL parser ---
const NAL_NAMES = { 1:'P-slice', 5:'IDR', 6:'SEI', 7:'SPS', 8:'PPS', 9:'AUD' };
function parseNals(data) {
  const nals = [];
  let i = 0;
  while (i < data.length - 4) {
    if (data[i]===0 && data[i+1]===0 && data[i+2]===0 && data[i+3]===1) {
      const type = data[i+4] & 0x1F;
      nals.push(type);
      i += 4;
    } else if (data[i]===0 && data[i+1]===0 && data[i+2]===1) {
      const type = data[i+3] & 0x1F;
      nals.push(type);
      i += 3;
    } else {
      i++;
    }
  }
  return nals;
}

// --- Connect ---
function connect() {
  disconnect();
  const deviceId = document.getElementById('device-select').value;
  const displayId = document.getElementById('display-id').value;
  if (!deviceId) { log('No device selected', 'log-error'); return; }

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/screen`);
  ws.binaryType = 'arraybuffer';
  log(`Connecting to ${deviceId} display=${displayId}...`);

  ws.onopen = () => {
    const forceH264 = document.getElementById('force-h264').checked;
    ws.send(JSON.stringify({ device_id: deviceId, screen_type: displayId, force_h264: forceH264 }));
    log('WebSocket opened, sent init message');
    startFps();
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      // JSON message
      const msg = JSON.parse(event.data);
      log('JSON: ' + JSON.stringify(msg), msg.type === 'error' ? 'log-error' : 'log-info');

      if (msg.mode === 'h264') {
        h264Mode = true;
        h264Size = { w: msg.width, h: msg.height };
        setModeTag('h264');
        document.getElementById('player').style.display = 'block';
        document.getElementById('jpeg-display').style.display = 'none';
        // Init JMuxer
        setTimeout(initJMuxer, 100);
        log(`H.264 mode: ${msg.width}x${msg.height}`);
      } else if (msg.mode === 'jpeg') {
        h264Mode = false;
        setModeTag('jpeg');
        document.getElementById('player').style.display = 'none';
        document.getElementById('jpeg-display').style.display = 'block';
        log('JPEG mode');
      }
    } else if (event.data instanceof ArrayBuffer) {
      const data = new Uint8Array(event.data);
      frameCount++;
      byteCount += data.length;

      if (h264Mode) {
        // Parse NALs for debug
        if (document.getElementById('log-nal').checked) {
          const nals = parseNals(data);
          nals.forEach(t => { nalStats[t] = (nalStats[t]||0) + 1; });
          if (document.getElementById('log-data').checked && (nals.includes(7) || nals.includes(5) || frameCount <= 5)) {
            const names = nals.map(t => NAL_NAMES[t] || `NAL-${t}`);
            log(`H.264 ${data.length}B NALs=[${names.join(',')}]`, 'log-data');
          }
        }
        // Feed to JMuxer
        if (jmuxer) {
          try {
            jmuxer.feed({ video: data });
          } catch (e) {
            log('JMuxer feed error: ' + e.message, 'log-error');
          }
        } else {
          if (frameCount <= 3) log('JMuxer not ready, dropping frame', 'log-warn');
        }
      } else {
        // JPEG
        const blob = new Blob([event.data], { type: 'image/jpeg' });
        const url = URL.createObjectURL(blob);
        const img = document.getElementById('jpeg-display');
        if (img._prevUrl) URL.revokeObjectURL(img._prevUrl);
        img._prevUrl = url;
        img.src = url;
        if (!h264Size.w && img.naturalWidth) {
          h264Size = { w: img.naturalWidth, h: img.naturalHeight };
        }
      }

      // Update info
      document.getElementById('info-bar').textContent =
        `Frame #${frameCount} | ${data.length}B | NAL stats: ${Object.entries(nalStats).map(([k,v])=>`${NAL_NAMES[k]||k}:${v}`).join(' ')}`;
    }
  };

  ws.onerror = (e) => log('WebSocket error', 'log-error');
  ws.onclose = () => { log('WebSocket closed'); setModeTag('off'); stopFps(); };
}

function initJMuxer() {
  if (jmuxer) { try { jmuxer.destroy(); } catch {} }
  const videoEl = document.getElementById('player');
  try {
    jmuxer = new JMuxer({
      node: videoEl,
      mode: 'video',
      flushingTime: 33,
      fps: 60,
      debug: true,
      onReady: () => log('JMuxer ready'),
      onError: (e) => log('JMuxer error: ' + e, 'log-error'),
    });
    log('JMuxer initialized (flushingTime=33, fps=60, debug=true)');
  } catch (e) {
    log('JMuxer init failed: ' + e.message, 'log-error');
  }
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  if (jmuxer) { try { jmuxer.destroy(); } catch {} jmuxer = null; }
  h264Mode = false;
  nalStats = {};
  stopFps();
  setModeTag('off');
  log('Disconnected');
}

function setModeTag(mode) {
  const el = document.getElementById('mode-tag');
  el.className = `tag tag-${mode}`;
  el.textContent = mode === 'h264' ? 'H.264' : mode === 'jpeg' ? 'JPEG' : 'OFF';
}

// --- Touch ---
const touchCanvas = document.getElementById('touch-canvas');
const touchDot = document.getElementById('touch-dot');
let touching = false;

function getCoords(e) {
  const rect = touchCanvas.getBoundingClientRect();
  const container = document.getElementById('video-container');
  const videoEl = h264Mode ? document.getElementById('player') : document.getElementById('jpeg-display');
  const natW = h264Mode ? (videoEl.videoWidth || h264Size.w || 1080) : (videoEl.naturalWidth || 1080);
  const natH = h264Mode ? (videoEl.videoHeight || h264Size.h || 1920) : (videoEl.naturalHeight || 1920);
  const scaleX = natW / rect.width;
  const scaleY = natH / rect.height;
  return {
    x: Math.round((e.clientX - rect.left) * scaleX),
    y: Math.round((e.clientY - rect.top) * scaleY),
    w: natW, h: natH,
    clientX: e.clientX - rect.left,
    clientY: e.clientY - rect.top,
  };
}

function sendTouch(action, coords) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'touch', action, x: coords.x, y: coords.y, w: coords.w, h: coords.h }));
}

touchCanvas.addEventListener('pointerdown', (e) => {
  touching = true;
  const c = getCoords(e);
  sendTouch(0, c); // DOWN
  touchDot.style.left = c.clientX + 'px';
  touchDot.style.top = c.clientY + 'px';
  touchDot.classList.add('active');
  log(`Touch DOWN (${c.x}, ${c.y})`, 'log-data');
});

touchCanvas.addEventListener('pointermove', (e) => {
  if (!touching) return;
  const c = getCoords(e);
  sendTouch(2, c); // MOVE
  touchDot.style.left = c.clientX + 'px';
  touchDot.style.top = c.clientY + 'px';
});

touchCanvas.addEventListener('pointerup', (e) => {
  if (!touching) return;
  touching = false;
  const c = getCoords(e);
  sendTouch(1, c); // UP
  touchDot.classList.remove('active');
  log(`Touch UP (${c.x}, ${c.y})`, 'log-data');
});

// --- Init ---
loadDevices();
</script>
</body>
</html>
